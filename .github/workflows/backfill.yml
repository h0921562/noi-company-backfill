name: Backfill Company Names

on:
  workflow_dispatch:
    inputs:
      chunk_id:
        description: 'Chunk ID (0-9)'
        required: true
        default: '0'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Run worker
        run: python worker.py ${{ github.event.inputs.chunk_id }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "Results chunk ${{ github.event.inputs.chunk_id }}"
          git push
